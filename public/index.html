<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrade - Educational Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --primary: #6366f1;
            --primary-glow: #818cf8;
            --student: #10b981;
            --student-glow: #34d399;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated background */
        .gradients-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .gradient-orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }
        .gradient-orb:nth-child(1) {
            width: 600px; height: 600px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            top: -200px; left: -200px;
        }
        .gradient-orb:nth-child(2) {
            width: 500px; height: 500px;
            background: linear-gradient(135deg, var(--student), #06b6d4);
            bottom: -150px; right: -150px; animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Selection container */
        .portal-container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 900px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        .logo-icon { display: inline-block; font-size: 48px; margin-right: 10px; }

        .subtitle {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 48px;
        }

        .roles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 768px) {
            .roles-grid { grid-template-columns: 1fr; }
        }

        /* Role card */
        .role-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .role-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Glow effect on hover */
        .role-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .role-card:hover::before { opacity: 1; }

        .role-icon {
            font-size: 64px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            transition: transform 0.4s ease;
        }
        
        .role-card:hover .role-icon { transform: scale(1.1) rotate(5deg); }

        .role-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .role-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Specific colors for cards */
        .role-card.teacher:hover { border-color: var(--primary); }
        .role-card.teacher:hover .role-title { color: var(--primary-glow); }

        .role-card.student:hover { border-color: var(--student); }
        .role-card.student:hover .role-title { color: var(--student-glow); }

        /* Login Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .login-modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .login-modal h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-modal p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .error-message {
            color: var(--error);
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .footer {
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="gradients-bg">
        <div class="gradient-orb"></div>
        <div class="gradient-orb"></div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="login-modal">
            <h2>Вход для учителей</h2>
            <p>Введите пароль для доступа к панели учителя</p>
            
            <div class="form-group">
                <label for="teacherPassword">Пароль</label>
                <input type="password" id="teacherPassword" placeholder="введите пароль">
                <div class="error-message" id="loginError"></div>
            </div>
            
            <button class="btn btn-primary" id="loginButton">Войти</button>
            <button class="btn btn-secondary" onclick="closeLoginModal()">Отмена</button>
        </div>
    </div>

    <div class="portal-container">
        <div class="logo">
            <span class="logo-icon">📝</span>SmartGrade
        </div>
        <p class="subtitle">Выберите режим входа</p>

        <div class="roles-grid">
            <div onclick="enterTeacherMode()" class="role-card teacher" style="cursor: pointer;">
                <div class="role-icon">👨‍🏫</div>
                <h2 class="role-title">Я Учитель</h2>
                <p class="role-desc">
                    Создание тестов, управление группами и аналитика.
                </p>
            </div>

            <div onclick="enterStudentMode()" class="role-card student" style="cursor: pointer;">
                <div class="role-icon">🎓</div>
                <h2 class="role-title">Я Студент</h2>
                <p class="role-desc">
                    Прохождение тестов, просмотр результатов и выполнение заданий.
                </p>
            </div>
        </div>

        <div class="footer">
            © 2026 SmartGrade Education Platform
        </div>
    </div>

    <script src="api-config.js"></script>
    <script>
        async function enterTeacherMode() {
            // Показываем модальное окно для ввода пароля
            const modal = document.getElementById('loginModal');
            modal.classList.add('active');
        }

        async function loginTeacher() {
            const passwordInput = document.getElementById('teacherPassword');
            const errorMessage = document.getElementById('loginError');
            const loginButton = document.getElementById('loginButton');
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                errorMessage.textContent = 'Пожалуйста, введите пароль';
                errorMessage.classList.add('show');
                return;
            }
            
            // Отключаем кнопку во время запроса
            loginButton.disabled = true;
            loginButton.textContent = 'Вход...';
            errorMessage.classList.remove('show');
            
            try {
                const result = await SmartGradeAPI.login(password);
                if (result.success) {
                    sessionStorage.setItem('smartgrade_role', 'teacher');
                    window.location.href = 'teacher-dashboard.html';
                } else {
                    errorMessage.textContent = result.error || 'Неверный пароль';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Error entering teacher mode:', error);
                errorMessage.textContent = 'Ошибка при входе';
                errorMessage.classList.add('show');
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'Войти';
            }
        }

        function closeLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.remove('active');
            document.getElementById('teacherPassword').value = '';
            document.getElementById('loginError').classList.remove('show');
        }

        function enterStudentMode() {
            sessionStorage.setItem('smartgrade_role', 'student');
            window.location.href = 'test-list.html';
        }

        // Добавляем обработчик на кнопку входа
        document.getElementById('loginButton').addEventListener('click', loginTeacher);

        // Обработчик на клавишу ввода пароля
        document.getElementById('teacherPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginTeacher();
            }
        });
    </script>
</body>
</html>

</html>
